{% extends "base.html" %}
{% block title %}Новый пароль | Бюро Кошачье{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 3rem auto; padding: 2rem; border: 1px solid var(--c-accent); border-radius: var(--radius-organic);">
    <h2 style="margin-top: 0;">Новый пароль</h2>
    <form action="/reset-password" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
        <input type="hidden" name="token" value="{{ token }}">
        <input type="password" name="password" required placeholder="Введите новый пароль" minlength="6" style="padding: 10px; border: 1px solid var(--c-accent); border-radius: 4px;">
        <button type="submit" class="btn" style="width: 100%; background: var(--c-danger);">Сохранить пароль</button>
    </form>
</div>
{% endblock %}
