<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SeaOddity{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css?v=1.1">

    <style>
        /* Стили для новых иконок в подвале */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        .social-icons a {
            color: var(--text-on-menu);
            opacity: 0.7;
            transition: opacity 0.3s, transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .social-icons a:hover {
            opacity: 1;
            transform: translateY(-3px);
        }
        .footer-links {
            margin-top: 10px;
            font-size: 0.85rem;
        }
        .footer-links a {
            color: var(--text-on-menu);
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        .footer-links a:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    {% block header %}
    <header>
        <a href="/" class="logo">SeaOddity</a>
        <nav>
            <a href="/">Каталог</a>
            <a href="/info">Оплата и доставка</a>
            <a href="/contacts">Контакты</a>
        </nav>
    </header>
    {% endblock %}

    {% block content %}{% endblock %}

    {% block footer %}
    <footer>
        <div class="social-icons">
            <a href="https://t.me/your_link" target="_blank" title="Telegram">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </a>

            <a href="https://vk.com/your_link" target="_blank" title="ВКонтакте">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 6h16v12H4z" stroke="none"/> <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14" fill="currentColor" stroke="none">VK</text>
                </svg>
            </a>

            <a href="https://instagram.com/your_link" target="_blank" title="Наше портфолио">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="4" width="16" height="16" rx="4" ry="4"></rect>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </a>
        </div>

        <p>&copy; 2026 SeaOddity. Все права защищены.</p>

        <div class="footer-links">
            <a href="/terms">Пользовательское соглашение</a>
        </div>
    </footer>
    {% endblock %}

    {% block scripts %}{% endblock %}

</body>
</html>
