<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CatBuro{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

</head>
<body>

    {% block header %}
    <header>
        <div class="brand-wrapper">
            <a href="/" class="logo-link" title="На главную">
                <img src="/static/images/logo.png" alt="Лого" class="site-logo">
            </a>
            <a href="/" class="logo">Бюро Кошачье №2</a>
        </div>

        <nav>
            <a href="/">Каталог</a>
            <a href="/profile" style="font-weight: bold; color: var(--c-heading);">Личный кабинет</a>
            <a href="/info">Оплата и доставка</a>
            <a href="/contacts">Контакты</a>
            <a href="/cart" style="font-weight: bold; color: var(--text-on-menu);">
                Корзина <span id="cart-count">(0)</span>
            </a>
        </nav>
    </header>
    {% endblock %}

    {% block content %}{% endblock %}

    {% block footer %}
    <footer>
        <div class="social-icons">
            <a href="https://t.me/your_link" target="_blank" title="Telegram">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </a>

            <a href="https://vk.com/your_link" target="_blank" title="ВКонтакте">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 6h16v12H4z" stroke="none"/> <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14" fill="currentColor" stroke="none">VK</text>
                </svg>
            </a>

            <a href="https://instagram.com/your_link" target="_blank" title="Наше портфолио">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="4" width="16" height="16" rx="4" ry="4"></rect>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </a>
        </div>

        <p>&copy; 2026 SeaOddity. Все права защищены.</p>

        <div class="footer-links">
            <a href="/terms">Пользовательское соглашение</a>
        </div>
    </footer>
    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    {% block scripts %}{% endblock %}

    <script>
        // Обновление счетчиков корзины (и в шапке, и в плавающей кнопке)
        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem('bureau_cart')) || [];
            let count = cart.reduce((sum, item) => sum + item.quantity, 0);

            // Обновляем текст в шапке
            const headerCount = document.getElementById('cart-count');
            if (headerCount) headerCount.innerText = `(${count})`;

            // Обновляем бейджик на плавающей кнопке
            const floatBadge = document.getElementById('float-cart-count');
            if (floatBadge) {
                floatBadge.innerText = count;
                // Прячем бейджик, если корзина пуста, чтобы не мусорить на экране
                floatBadge.style.display = count > 0 ? 'flex' : 'none';
            }
        }

        // Логика появления кнопки "Наверх"
        function handleScroll() {
            const scrollTopBtn = document.getElementById('btn-scroll-top');
            // Показываем кнопку, если прокрутили вниз больше чем на 300 пикселей
            if (window.scrollY > 300) {
                scrollTopBtn.classList.add('show');
            } else {
                scrollTopBtn.classList.remove('show');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateCartCount();
            // Слушаем прокрутку страницы
            window.addEventListener('scroll', handleScroll);
            // Запускаем один раз при загрузке, чтобы проверить, где мы находимся
            handleScroll();
        });
    </script>

    <div class="floating-actions">
        <button class="float-btn" id="btn-scroll-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" title="Наверх">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
        </button>

        <a href="/cart" class="float-btn cart-btn" title="Корзина">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <div class="float-cart-badge" id="float-cart-count">0</div>
        </a>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        // Функция показа красивых уведомлений
        function showToast(message, isCustom = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            // Назначаем классы в зависимости от того, товар в наличии или на заказ
            toast.className = `toast ${isCustom ? 'toast-custom' : 'toast-success'}`;
            const icon = isCustom ? '⚒' : '✓';

            toast.innerHTML = `<span class="toast-icon">${icon}</span><span class="toast-message">${message}</span>`;
            container.appendChild(toast);

            // Запускаем анимацию появления
            setTimeout(() => toast.classList.add('show'), 10);

            // Удаляем тост через 3 секунды
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400); // Ждем окончания анимации
            }, 3000);
        }

        // ГЛОБАЛЬНАЯ ФУНКЦИЯ ДОБАВЛЕНИЯ В КОРЗИНУ (с поддержкой вариаций)
        function addToCart(id, title, price, image, isCustom, variantId = null) {
            let cart = JSON.parse(localStorage.getItem('bureau_cart')) || [];

            // Ищем товар, проверяя не только ID, но и выбранный вариант!
            let existingItem = cart.find(item => item.id === id && item.variant_id === variantId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    id: id,
                    variant_id: variantId, // Сохраняем ID вариации для базы данных
                    title: title,
                    price: price,
                    image: image,
                    quantity: 1,
                    is_custom: isCustom
                });
            }

            localStorage.setItem('bureau_cart', JSON.stringify(cart));
            updateCartCount();
            showToast(isCustom ? "Добавлено (на заказ)" : "Добавлено в корзину", isCustom);
        }

        // Обновление счетчиков корзины (оставляем как было)
        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem('bureau_cart')) || [];
            let count = cart.reduce((sum, item) => sum + item.quantity, 0);

            const headerCount = document.getElementById('cart-count');
            if (headerCount) headerCount.innerText = `(${count})`;

            const floatBadge = document.getElementById('float-cart-count');
            if (floatBadge) {
                floatBadge.innerText = count;
                floatBadge.style.display = count > 0 ? 'flex' : 'none';
            }
        }

        function handleScroll() {
            const scrollTopBtn = document.getElementById('btn-scroll-top');
            if (window.scrollY > 300) {
                scrollTopBtn.classList.add('show');
            } else {
                scrollTopBtn.classList.remove('show');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateCartCount();
            window.addEventListener('scroll', handleScroll);
            handleScroll();

            // --- НОВЫЙ КОД: Логика плавного появления элементов ---
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.1 // Анимация стартует, когда элемент видно на 10%
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        observer.unobserve(entry.target); // Анимируем только 1 раз
                    }
                });
            }, observerOptions);

            // Находим все скрытые секции и следим за ними
            document.querySelectorAll('.fade-in-section').forEach(section => {
                observer.observe(section);
            });
        });
    </script>
</body>
</html>
