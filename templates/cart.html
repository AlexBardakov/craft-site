{% extends "base.html" %}

{% block title %}Корзина | Бюро Кошачье{% endblock %}

{% block content %}
<main>
    <h1 class="page-title">Ваша корзина</h1>
    
    <div class="content-block" id="cart-container">
    </div>

    <div class="content-block" id="order-form-container" style="display: none;">
        <h2>Оформление заказа</h2>
        <form action="/order" method="POST" id="order-form">
            <input type="hidden" name="cart_data" id="cart_data_input">

            <div class="form-group">
                <label>Ваш адрес электронной почты, ссылка вконтакте или номер телефона:</label>
                <input type="text" name="contact" id="contact" placeholder="Ссылка, номер телефона (для прочих мессенджеров) или адрес электронной почты" required style="width: 100%; padding: 10px; border: 1px solid var(--c-accent); border-radius: var(--radius-organic-alt); font-size: 1rem; box-sizing: border-box;"
                value="{{ user.phone if user and user.phone else (user.email if user else '') }}">
            </div>

            <div class="form-group" style="background: rgba(102, 155, 188, 0.05); padding: 15px; border-radius: var(--radius-organic-alt); border: 1px solid var(--c-accent);">
                <label style="font-weight: bold; margin-bottom: 10px; display: block;">Способ доставки:</label>
                <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px;">
                    <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
                        <input type="radio" name="delivery_method" value="Почта России" checked onchange="triggerCalculate()"> Почта России (по РФ)
                    </label>
                    <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
                        <input type="radio" name="delivery_method" value="СДЭК" onchange="triggerCalculate()"> СДЭК (до ПВЗ)
                    </label>
                </div>

                <label>Адрес (Город, индекс, улица, дом или адрес ПВЗ):</label>
                <input type="text" name="delivery_address" id="city-input" required placeholder="Например: г. Москва, ул. Ленина..."
                style="width: 100%; padding: 10px; border: 1px solid var(--c-accent); border-radius: var(--radius-organic-alt); box-sizing: border-box;"
                oninput="debounceCalculate()">
                <div style="margin-top: 10px; font-size: 0.85rem; color: var(--c-text); opacity: 0.8; font-style: italic; line-height: 1.4;">
                    * Указанная стоимость доставки является ориентировочной. Точная сумма будет рассчитана и согласована с вами при подтверждении заказа.
                </div>
            </div>

            <div class="form-group">
                <label>Комментарий (пожелания к заказу):</label>
                <textarea name="comment" placeholder="Например: профиль кейкапа или особенности покраски..."></textarea>
            </div>

            <button type="submit" class="btn-buy" style="width: 100%;">Отправить заказ</button>
        </form>
    </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const cartContainer = document.getElementById('cart-container');
    const orderFormContainer = document.getElementById('order-form-container');
    const cartDataInput = document.getElementById('cart_data_input');

    let cart = JSON.parse(localStorage.getItem('bureau_cart')) || [];

    // Инициализируем переменные ДО вызова функций
    let currentDeliveryCost = 350;
    let debounceTimer;

    function renderCart() {
        if (cart.length === 0) {
            cartContainer.innerHTML = "<p style='text-align: center;'>Ваша корзина пуста. Загляните в <a href='/#catalog' style='color: var(--text-on-menu);'>каталог</a>!</p>";
            orderFormContainer.style.display = "none";
            return;
        }

        let html = '<table style="width: 100%; border-collapse: collapse; margin-bottom: 2rem;">';
        let total = 0;

        cart.forEach((item, index) => {
            let itemTotal = item.price * item.quantity;
            total += itemTotal;
            html += `
                <tr style="border-bottom: 1px dashed rgba(122, 163, 152, 0.4);">
                    <td style="padding: 10px; width: 60px;">
                        <img src="${item.image}" style="width: 50px; height: 50px; border-radius: 4px; object-fit: cover;">
                    </td>

                    <td style="padding: 10px;">
                        <div style="max-width: 150px; word-wrap: break-word; word-break: break-word; line-height: 1.2;">
                            <b>${item.title}</b>
                        </div>
                        ${item.is_custom ? '<div style="margin-top: 4px;"><small style="color: var(--c-danger); font-weight: bold;">⚒ На заказ</small></div>' : ''}
                    </td>

                    <td style="padding: 10px; white-space: nowrap;">${item.price} ₽</td>

                    <td style="padding: 10px; white-space: nowrap;">
                        <button onclick="changeQty(${index}, -1)" style="padding: 2px 8px; cursor: pointer;">-</button>
                        <span style="margin: 0 5px;">${item.quantity}</span>
                        <button onclick="changeQty(${index}, 1)" style="padding: 2px 8px; cursor: pointer;">+</button>
                    </td>

                    <td style="padding: 10px; font-weight: bold; white-space: nowrap;">${itemTotal} ₽</td>

                    <td style="padding: 10px; text-align: right;">
                        <button onclick="removeItem(${index})" style="color: red; border: none; background: none; cursor: pointer; font-size: 1.2rem; padding: 5px;">✕</button>
                    </td>
                </tr>
            `;
        });

        // Выводим разбивку по стоимости
        html += `</table><h3 style="text-align: right; color: var(--text-on-menu); line-height: 1.5;">Товары: ${total} ₽<br>Доставка: ${currentDeliveryCost} ₽<br>Итого: ${total + currentDeliveryCost} ₽</h3>`;
        cartContainer.innerHTML = html;

        orderFormContainer.style.display = "block";
        cartDataInput.value = JSON.stringify(cart);
    }

    window.changeQty = function(index, delta) {
        cart[index].quantity += delta;
        if (cart[index].quantity <= 0) cart.splice(index, 1);
        updateAndRender();
    }

    window.removeItem = function(index) {
        cart.splice(index, 1);
        updateAndRender();
    }

    function updateAndRender() {
        localStorage.setItem('bureau_cart', JSON.stringify(cart));
        // Защита от ошибки, если функции счетчика нет на странице
        if (typeof updateCartCount === 'function') updateCartCount();
        renderCart();
    }

    window.debounceCalculate = function() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(fetchDeliveryCost, 800);
    }

    window.triggerCalculate = function() {
        fetchDeliveryCost();
    }

    async function fetchDeliveryCost() {
        const cityInput = document.getElementById('city-input');
        const methodInput = document.querySelector('input[name="delivery_method"]:checked');

        if (!cityInput || !methodInput) return;

        const formData = new FormData();
        formData.append('city', cityInput.value);
        formData.append('method', methodInput.value);

        try {
            const response = await fetch('/api/calculate-delivery', { method: 'POST', body: formData });
            const data = await response.json();
            currentDeliveryCost = data.cost;
            updateAndRender(); // Перерисовываем с новой ценой
        } catch (e) {
            console.error("Ошибка сети при расчете доставки", e);
        }
    }

    document.getElementById('order-form').addEventListener('submit', () => {
        localStorage.removeItem('bureau_cart');
    });

    // Запускаем отрисовку корзины при загрузке страницы
    renderCart();
});
</script>
{% endblock %}
